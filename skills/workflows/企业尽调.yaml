id: due-diligence
name: 企业尽调
description: 组合企业画像、股权结构、司法风险和融资历史，生成企业尽调摘要。

inputs:
  - company_name
  - unified_social_credit_code
  - purpose

steps:
  - id: profile
    card: 企业画像

  - id: shareholder_structure
    card: 股权结构分析
    needs: [profile]

  - id: litigation_risk
    card: 司法风险分析
    needs: [profile]

  - id: financing_history
    card: 融资历史分析
    needs: [profile]

  - id: final_report
    combine:
      - profile
      - shareholder_structure
      - litigation_risk
      - financing_history
    output: due_diligence_report

output_format:
  - 企业基本判断
  - 股权与控制风险
  - 司法与经营风险
  - 融资与资本市场信号
  - 数据缺口
  - 尽调建议
