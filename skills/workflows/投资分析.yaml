id: investment-analysis
name: 投资分析
description: 组合企业画像、股权结构、司法风险和融资历史，生成投资研判报告。

inputs:
  - company_name
  - unified_social_credit_code
  - investment_thesis
  - time_horizon

steps:
  - id: profile
    card: 企业画像

  - id: shareholder_structure
    card: 股权结构分析
    needs: [profile]

  - id: litigation_risk
    card: 司法风险分析
    needs: [profile]

  - id: financing_history
    card: 融资历史分析
    needs: [profile]

  - id: final_report
    combine:
      - profile
      - shareholder_structure
      - litigation_risk
      - financing_history
    output: investment_analysis_report

output_format:
  - 投资标的概览
  - 商业模式与行业位置
  - 股权与治理结构评估
  - 司法与合规风险
  - 融资与估值信号
  - 投资亮点与主要风险
  - 数据缺口
  - 投资建议与跟踪要点
