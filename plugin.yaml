name: company-work-suite
version: 0.1.0
description: Enterprise knowledge-card skills for company research, due diligence, and investment analysis.
author: zhaoxuan
requires_env:
  - name: QCC_MCP_TOKEN
    description: Token for Qichacha MCP access.
    secret: true
mcp_servers:
  qcc-company:
    url: https://agent.qcc.com/mcp/company/stream
    timeout: 120
    connect_timeout: 30
    headers:
      Authorization: "Bearer ${QCC_MCP_TOKEN}"
  qcc-risk:
    url: https://agent.qcc.com/mcp/risk/stream
    timeout: 120
    connect_timeout: 30
    headers:
      Authorization: "Bearer ${QCC_MCP_TOKEN}"
  qcc-ipr:
    url: https://agent.qcc.com/mcp/ipr/stream
    timeout: 120
    connect_timeout: 30
    headers:
      Authorization: "Bearer ${QCC_MCP_TOKEN}"
  qcc-operation:
    url: https://agent.qcc.com/mcp/operation/stream
    timeout: 120
    connect_timeout: 30
    headers:
      Authorization: "Bearer ${QCC_MCP_TOKEN}"
  qcc-executive:
    url: https://agent.qcc.com/mcp/executive/stream
    timeout: 120
    connect_timeout: 30
    headers:
      Authorization: "Bearer ${QCC_MCP_TOKEN}"
provides_commands: [cws-company-basic-info, cws-company-profile, cws-data-agent, cws-due-diligence, cws-financing-history, cws-gen-agent, cws-investment-analysis, cws-karpathy-llm-wiki, cws-litigation-risk, cws-shareholder-structure, cws-workflow]
provides_skills: [cws-company-basic-info, cws-company-profile, cws-data-agent, cws-due-diligence, cws-financing-history, cws-gen-agent, cws-investment-analysis, cws-karpathy-llm-wiki, cws-litigation-risk, cws-shareholder-structure, cws-workflow]
